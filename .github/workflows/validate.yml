name: Validate feeds
on:
  schedule:
    - cron: "0 2 * * 0"     # Sundays, 02:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Health-check every feed
        run: python3 validate.py
      - name: Commit any pruning
        run: |
          git config user.name  "feed-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalogue.json
          git diff --cached --quiet || git commit -m "weekly feed health check ($(date -u +%F))"
          git push
